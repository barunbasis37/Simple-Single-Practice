<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello AI — Simple Single Practice</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7fb;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #5a5a72;
    --accent: #6c5ce7;
    --accent-2: #00cec9;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --text: #eaeaf5;
      --muted: #a0a0b8;
      --accent: #a29bfe;
      --accent-2: #55efc4;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 2rem;
  }

  .card {
    background: var(--card);
    border-radius: 1rem;
    padding: 2.5rem 3rem;
    max-width: 32rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
  }

  .badge {
    display: inline-block;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    margin-bottom: 1.2rem;
  }

  h1 {
    margin: 0 0 0.6rem;
    font-size: 1.8rem;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  p {
    margin: 0.4rem 0;
    color: var(--muted);
    line-height: 1.6;
  }

  .wave {
    font-size: 2.2rem;
    display: inline-block;
    animation: wave 1.6s ease-in-out infinite;
    transform-origin: 70% 70%;
  }

  @keyframes wave {
    0%, 60%, 100% { transform: rotate(0deg); }
    10%, 30% { transform: rotate(14deg); }
    20%, 40% { transform: rotate(-8deg); }
  }

  .footer {
    margin-top: 1.6rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
</style>
</head>
<body>
  <main class="card">
    <span class="badge">Ostad · AI for SD</span>
    <div class="wave">👋</div>
    <h1>Hello, AI!</h1>
    <p>Welcome to <strong>Simple Single Practice</strong> — a hands-on
      playground for learning how AI-assisted software development works
      in practice.</p>
    <p>This project exists to experiment, break things, and learn by doing.</p>
    <div class="footer">Built while practicing with Claude Code.</div>
  </main>
</body>
</html>
